<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How To Make A Pizza</title>
<style>
/* ── Reset & base ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
  user-select: none;
}

/* ── Stage: 16:9, centred ───────────────────────────────────── */
#stage {
  position: relative;
  width: 100vw;
  height: 56.25vw;
  max-height: 100vh;
  max-width: 177.78vh;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  overflow: hidden;
}

/* ── Slide container ────────────────────────────────────────── */
.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity .45s ease;
  pointer-events: none;
}
.slide.active  { opacity: 1; pointer-events: auto; z-index: 2; }
.slide.leaving { opacity: 0; z-index: 1; }

/* Full-cover background image */
.bg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

/* ── Typography scale (all relative to slide width via vw) ──── */
/* Slide is always 100vw wide at max-width; safe zone ~94vw     */
/* Title sizes */
.t-hero   { font-size: 5.5vw; font-weight: 300; color: #fff; }
.t-title  { font-size: 3.6vw; font-weight: 300; color: #fff; }
.t-head   { font-size: 2.0vw; font-weight: 700; color: #fff; }
.t-subhd  { font-size: 1.6vw; font-weight: 400; color: #fff; }
.t-body   { font-size: 1.35vw; font-weight: 400; color: #fff; line-height: 1.5; }
.t-small  { font-size: 1.1vw;  font-weight: 400; color: #ddd; line-height: 1.4; }
.t-orange { color: #e05c30; }
.t-yellow { color: #FFE000; }
.t-teal   { color: #00d4c8; }
.t-grey   { color: #aaa; }

/* ── Semi-transparent box ───────────────────────────────────── */
.box-dark {
  background: rgba(0,0,0,.60);
  border-radius: 2px;
}
.box-mid {
  background: rgba(40,40,40,.70);
  border-radius: 2px;
}

/* ── Bullet animation: float up, yellow → white ─────────────── */
.blt {
  opacity: 0;
  transform: translateY(10px);
  transition: none;
  color: #FFE000;
}
.blt.in {
  opacity: 1;
  transform: translateY(0);
  transition: opacity .4s ease, transform .4s ease;
}
.blt.dim { color: #fff; transition: color .5s ease; }

/* Section-block reveal (whole box fades in) */
.blk {
  opacity: 0;
  transform: translateY(8px);
  transition: none;
}
.blk.in {
  opacity: 1;
  transform: translateY(0);
  transition: opacity .4s ease, transform .4s ease;
}

/* ── Steps in Making Pizza ──────────────────────────────────── */
.step-row {
  display: flex;
  align-items: flex-start;
  gap: 1.5%;
  margin-bottom: 3%;
}
.step-num {
  font-size: 7vw;
  font-weight: 700;
  line-height: 1;
  min-width: 9%;
  text-align: right;
}
.step-text { flex: 1; }
.step-head { font-size: 2vw; font-weight: 700; margin-bottom: .4%; }
.step-desc { font-size: 1.2vw; line-height: 1.4; }
.step-active .step-num  { color: #e05c30; }
.step-active .step-head { color: #fff; }
.step-active .step-desc { color: #ddd; }
.step-done .step-num  { color: #555; }
.step-done .step-head { color: #666; }
.step-done .step-desc { color: #555; }

/* ── Wheel animation for slide 5 table columns ──────────────── */
@keyframes wheel-reveal {
  0%   { transform: rotate(-180deg) scale(.5); opacity: 0; }
  70%  { opacity: 1; }
  100% { transform: rotate(0deg) scale(1); opacity: 1; }
}
.wheel-col { opacity: 0; transform-origin: center center; }
.wheel-col.in { animation: wheel-reveal .5s cubic-bezier(.4,0,.2,1) forwards; }

/* ── Quiz ───────────────────────────────────────────────────── */
.quiz-q {
  font-size: 2vw;
  font-weight: 700;
  color: #e05c30;
  line-height: 1.3;
  margin-bottom: 3%;
}
.quiz-options { display: flex; flex-direction: column; gap: 1.8%; }
.quiz-btn {
  display: flex;
  align-items: stretch;
  border: 1.5px solid rgba(180,180,180,.6);
  border-radius: 2px;
  background: rgba(0,0,0,.55);
  cursor: pointer;
  transition: border-color .15s, background .15s;
  height: 9.5vh; /* uniform height for all options */
  overflow: hidden;
}
.quiz-btn:hover:not(.locked) { border-color: #fff; background: rgba(255,255,255,.1); }
.quiz-letter {
  background: rgba(30,30,30,.8);
  color: #fff;
  font-size: 2.2vw;
  font-weight: 700;
  width: 5.5%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.quiz-text {
  color: #fff;
  font-size: 1.35vw;
  padding: 0 2%;
  display: flex;
  align-items: center;
  line-height: 1.3;
}
.quiz-btn.wrong   { border-color: #c00; background: rgba(160,0,0,.3); animation: shake .38s ease; }
.quiz-btn.correct { border-color: #0a0; background: rgba(0,140,50,.3); pointer-events: none; }
.locked { pointer-events: none; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-7px); }
  50%      { transform: translateX(7px); }
  75%      { transform: translateX(-4px); }
}

/* Wrong overlay */
.wrong-ov {
  position: absolute;
  left: 5%; top: 30%;
  width: 35%; height: 30%;
  background: #c01800;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 2.4vw;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  opacity: 0;
  transform: scale(.5);
  transition: opacity .2s ease, transform .25s cubic-bezier(.2,1.4,.4,1);
  pointer-events: none;
  z-index: 8;
}
.wrong-ov.in { opacity: 1; transform: scale(1); }

/* Correct starburst — visual only, no text */
.correct-ov {
  position: absolute;
  left: 5%; top: 25%;
  width: 40%; height: 45%;
  opacity: 0;
  transform: scale(.4) rotate(-15deg);
  transition: opacity .25s ease, transform .3s cubic-bezier(.2,1.5,.4,1);
  pointer-events: none;
  z-index: 8;
}
.correct-ov.in { opacity: 1; transform: scale(1) rotate(0deg); }
.starburst {
  width: 100%; height: 100%;
  background: #1a9c2a;
  clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  display: flex; align-items: center; justify-content: center;
}
.correct-checkmark {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 6vw;
  font-weight: 700;
}

/* ── Navigation arrows ──────────────────────────────────────── */
#nav-prev, #nav-next {
  position: fixed;
  bottom: 1.5vh;
  z-index: 200;
  width: 5.5vh; height: 5.5vh;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.55);
  color: rgba(255,255,255,.8);
  font-size: 2.2vh;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .18s, border-color .18s, color .18s;
}
#nav-prev { left: 2vh; }
#nav-next { right: 2vh; }
#nav-prev:hover, #nav-next:hover {
  background: rgba(255,255,255,.2);
  border-color: rgba(255,255,255,.7);
  color: #fff;
}

#counter {
  position: fixed;
  bottom: 2.2vh;
  left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,.35);
  font-size: 1.4vh;
  font-family: Arial, sans-serif;
  pointer-events: none;
  z-index: 200;
}
</style>
</head>
<body>

<div id="stage"></div>
<button id="nav-prev">&#8592;</button>
<div id="counter"></div>
<button id="nav-next">&#8594;</button>

<script>
/* =============================================================
   HELPERS
   ============================================================= */
const BG = 'assets/backgrounds/';
const SL = 'assets/slides/';

function blt(id, text, extraStyle) {
  return `<div class="blt" id="${id}" style="${extraStyle||''}">• ${text}</div>`;
}
function showBlt(id, dimDelay) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('in');
  setTimeout(() => el.classList.add('dim'), dimDelay || 600);
}
function showBlk(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('in');
}

/* =============================================================
   SLIDE DEFINITIONS
   Each slide: { bg, build(div), clicks:[], quiz:{} }
   ============================================================= */
const SLIDES = [

/* ── 0: Title ─────────────────────────────────────────────── */
{
  bg: BG+'Slide2.PNG',
  build(d) {},
  clicks: []
},

/* ── 1: Why Make a Pizza? ──────────────────────────────────── */
/* 2 sections. Bg has waiter + pizza photo baked in.
   Section 1: heading + para floats in together (click 1)
   Section 2: heading floats in (click 2), then 3 bullets one by one (clicks 3-5) */
{
  bg: BG+'Slide3.PNG',
  build(d) {
    d.innerHTML += `
    <div style="position:absolute;left:3%;top:3%;right:3%">
      <div class="t-title" style="color:#fff;font-weight:300">Why Make a Pizza?</div>
    </div>

      <div class="blk" id="s1-sec1">

        <div class="t-body" style="color:#ddd;margin-bottom:4%">Approximately 3 BILLION pizzas are sold in the U.S. each year. Americans eat approximately 100 acres of pizza EACH DAY, or about 350 slices per second!*</div>
      </div>

      <div class="blk" id="s1-sec2h">
        <div style="font-size:1.8vw;font-weight:700;color:#e05c30;margin-bottom:2%">Pizza is easy to make.</div>
      </div>

      <div class="blt t-body" id="s1-b1">The ingredients are readily available</div>
      <div class="blt t-body" id="s1-b2" style="margin-top:.8%">Even if you make it from scratch, can be ready in an hour</div>
      <div class="blt t-body" id="s1-b3" style="margin-top:.8%">The recipe is not complicated</div>
    </div>
    <div style="position:absolute;bottom:1%;right:2%;font-size:.9vw;color:#888;font-style:italic">*http://roccosgrandblanc.com/pizza-facts/</div>`;
  },
  clicks: [
    () => showBlk('s1-sec1'),
    () => showBlk('s1-sec2h'),
    () => showBlt('s1-b1'),
    () => showBlt('s1-b2'),
    () => showBlt('s1-b3'),
  ]
},

   Title + 5 question items animate in as two groups by section.
   Click 1: title + top 2 items (Quantity + Safety) which are top of the arc
   Click 2: remaining 3 items (Style, Occasion, Equipment) */
{
  bg: BG+'Slide4.PNG',
  build(d) {
    d.innerHTML += `
    <div style="position:absolute;left:2%;top:2%;right:2%">
      <div class="t-hero" style="font-weight:300;color:#fff">Let&rsquo;s start with some questions</div>
    </div>

        </div>
      </div>
      <div class="blk" id="s2-g2">
        <div style="margin-bottom:3%">
          <div style="font-size:1.5vw;font-weight:700;color:#e05c30;margin-bottom:.5%">Style</div>
          <div class="t-small">Do you have a particular style of pizza in mind? <em>(Like Hawaiian, thin crust, Chicago-style, New-York style, etc.)</em> Each of these styles requires different kinds of ingredients.</div>
        </div>
        <div style="margin-bottom:3%">
          <div style="font-size:1.5vw;font-weight:700;color:#e05c30;margin-bottom:.5%">Occasion</div>
          <div class="t-small">Is the pizza for a special occasion, like a birthday? If so, you might want to decorate it in a special way!</div>
        </div>
        <div>
          <div style="font-size:1.5vw;font-weight:700;color:#e05c30;margin-bottom:.5%">Equipment</div>
          <div class="t-small">Do you have access to a kitchen, or an oven capable of cooking the pizza?</div>
        </div>
      </div>
    </div>`;
  },
  clicks: [
    () => showBlk('s2-g1'),
    () => showBlk('s2-g2'),
  ]

/* ── 3: How much pizza to make? (table + wheel cols) ────────── */
{
  bg: BG+'Slide5.PNG',
  build(d) {
    d.innerHTML += `
    <div style="position:absolute;top:3%;left:0;right:0;text-align:center">

      <div style="flex:1;display:flex;flex-direction:column">
        <div style="background:#c0392b;padding:2% 3%;font-size:1.3vw;font-weight:700;color:#fff;text-align:center;line-height:1.25;flex-shrink:0">Pizza size<br>in inches</div>
        <div style="flex:1;display:flex;flex-direction:column">
          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.1);font-size:1.3vw;color:#fff">8-10&rdquo;</div>
          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.1);font-size:1.3vw;color:#fff">12&rdquo;</div>

          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.1);font-size:1.3vw;color:#fff">16&rdquo;</div>

      </div>

      <!-- Col 2: Yellow/amber - Slices (WHEEL IN on click 2) -->

          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.1);font-size:1.3vw;color:#fff">8</div>
          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(90,70,0,.6);border:2px solid #FFE000;font-size:1.3vw;color:#fff;font-weight:700">10</div>
          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.1);font-size:1.3vw;color:#fff">12</div>

          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);font-size:1.3vw;color:#fff">$16.49</div>
        </div>
      </div>

      <!-- Col 4: Dark green - Servings -->
      <div style="flex:1;display:flex;flex-direction:column">
        <div style="background:#1a6645;padding:2% 3%;font-size:1.3vw;font-weight:700;color:#fff;text-align:center;line-height:1.25;flex-shrink:0">Number of<br>Pizza Servings</div>
        <div style="flex:1;display:flex;flex-direction:column">
          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.1);font-size:1.3vw;color:#fff">2-3</div>
          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.1);font-size:1.3vw;color:#fff">3-4</div>

  },
  clicks: [
    () => { showBlk('s3-left'); showBlk('s3-table'); },
    () => { document.getElementById('s3-col-teal').classList.add('in'); },
    () => { document.getElementById('s3-col-yellow').classList.add('in'); },

},

/* ── 4: Steps 01 – Gathering the ingredients ────────────────── */
{
  bg: BG+'Slide6.PNG',
  build(d) {
    d.innerHTML += `
    <div style="position:absolute;left:2%;bottom:5%;width:32%">
      <div style="font-size:4.5vw;font-weight:300;color:#fff;line-height:1.1">Steps in<br>Making<br>Pizza</div>
    </div>
    <div style="position:absolute;left:38%;top:8%;right:3%">
      <div class="step-row step-active">
        <div class="step-num">01</div>
        <div class="step-text">
          <div class="step-head">Gathering the ingredients</div>

        </div>
      </div>
    </div>`;
  },
  clicks: []
},

/* ── 5: Materials Necessary (11 items, 2 sections) ──────────── */
{
  bg: BG+'Slide7.PNG',
  build(d) {
    d.innerHTML += `
    <div style="position:absolute;right:3%;top:5%;width:52%">
      <div style="font-size:3.2vw;font-weight:700;color:#fff;letter-spacing:.4em;line-height:1">MATERIALS</div>
      <div style="font-size:2.4vw;font-weight:700;color:#e05c30;letter-spacing:.4em;margin-bottom:4%">NECESSARY</div>

/* =============================================================
   ENGINE
   ============================================================= */
const stage = document.getElementById('stage');
const ctr   = document.getElementById('counter');
let cur = 0, step = 0, busy = false;

function buildSlide(idx) {
  const s = SLIDES[idx];
  const div = document.createElement('div');
  div.className = 'slide';
  div.innerHTML = `<img class="bg" src="${s.bg||''}" alt="">`;

  if (s.quiz) {
    buildQuiz(div, idx, s.quiz);
  } else if (s.build) {
    s.build(div);
  }
  return div;
}

function buildQuiz(div, idx, q) {
  div.innerHTML += `
    <div style="position:absolute;top:7%;left:0;right:0;text-align:center">
      <div style="font-size:4vw;font-weight:700;color:#fff">Review Questions</div>
    </div>
    <div style="position:absolute;top:20%;right:3%;width:46%">
      <div class="quiz-q">${q.question}</div>
      <div class="quiz-options" id="qopts-${idx}">
        ${q.options.map((o,i)=>`
          <div class="quiz-btn" id="qbtn-${idx}-${i}" data-correct="${o.correct}">
            <div class="quiz-letter">${o.letter}</div>
            <div class="quiz-text">${o.text}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="wrong-ov" id="qwrong-${idx}">That&rsquo;s not<br>correct.<br>Try again!</div>
    <div class="correct-ov" id="qcorrect-${idx}">
      <div class="starburst"></div>
      <div class="correct-checkmark">&#10003;</div>
    </div>`;
}

function wireQuiz(div, idx) {
  const q = SLIDES[idx].quiz;
  if (!q) return;
  const wrong = div.querySelector(`#qwrong-${idx}`);
  const correct = div.querySelector(`#qcorrect-${idx}`);
  div.querySelectorAll('.quiz-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (btn.classList.contains('locked')) return;
      if (btn.dataset.correct === 'true') {
        btn.classList.add('correct');
        div.querySelectorAll('.quiz-btn').forEach(b=>b.classList.add('locked'));
        wrong.classList.remove('in');
        correct.classList.add('in');
        setTimeout(() => advance(), 800);
      } else {
        btn.classList.add('wrong');
        wrong.classList.add('in');
        setTimeout(() => {
          btn.classList.remove('wrong');
          wrong.classList.remove('in');
        }, 1200);
      }
    });
  });
}

function goTo(idx) {
  if (busy || idx < 0 || idx >= SLIDES.length) return;
  busy = true;
  const incoming = buildSlide(idx);
  stage.appendChild(incoming);
  if (SLIDES[idx].quiz) wireQuiz(incoming, idx);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const out = stage.querySelector('.slide.active');
    if (out) { out.classList.remove('active'); out.classList.add('leaving'); setTimeout(()=>out.remove(),500); }
    incoming.classList.add('active');
    cur = idx; step = 0;
    updateCtr();
    busy = false;
  }));
}

function advance() {
  if (cur < SLIDES.length-1) goTo(cur+1);
}

function handleClick(e) {
  if (e.target.closest('.quiz-btn') || e.target.closest('#nav-prev') || e.target.closest('#nav-next')) return;
  const s = SLIDES[cur];
  if (s.quiz) return;
  const clicks = s.clicks||[];
  if (step < clicks.length) { clicks[step](); step++; }
}

function updateCtr() { ctr.textContent = `${cur+1} / ${SLIDES.length}`; }

document.getElementById('nav-next').addEventListener('click', e => {
  e.stopPropagation();
  const s = SLIDES[cur];
  if (!s.quiz && step < (s.clicks||[]).length) { (s.clicks||[])[step](); step++; }
  else advance();
});
document.getElementById('nav-prev').addEventListener('click', e => {
  e.stopPropagation();
  if (cur > 0) goTo(cur-1);
});
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); document.getElementById('nav-next').click(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); if(cur>0)goTo(cur-1); }
});
stage.addEventListener('click', handleClick);

// Preload next bg
function preload(idx) {
  const s = SLIDES[idx];
  if (s && s.bg) { const i=new Image(); i.src=s.bg; }
}

// Init
const first = buildSlide(0);
stage.appendChild(first);
if (SLIDES[0].quiz) wireQuiz(first, 0);
first.classList.add('active');
updateCtr();
preload(1);
</script>
