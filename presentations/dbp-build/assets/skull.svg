<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <!-- Skull head -->
  <ellipse cx="50" cy="40" rx="32" ry="30" fill="#fff"/>
  <!-- Jaw -->
  <rect x="32" y="58" width="36" height="18" rx="4" fill="#fff"/>
  <!-- Jaw teeth gaps -->
  <rect x="38" y="62" width="6" height="10" rx="2" fill="#000"/>
  <rect x="47" y="62" width="6" height="10" rx="2" fill="#000"/>
  <rect x="56" y="62" width="6" height="10" rx="2" fill="#000"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="38" rx="10" ry="11" fill="#000"/>
  <ellipse cx="62" cy="38" rx="10" ry="11" fill="#000"/>
  <!-- Nose -->
  <ellipse cx="50" cy="52" rx="5" ry="4" fill="#000"/>
  <!-- Crossbones -->
  <line x1="15" y1="80" x2="85" y2="95" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <line x1="85" y1="80" x2="15" y2="95" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <circle cx="15" cy="80" r="6" fill="#fff"/>
  <circle cx="85" cy="80" r="6" fill="#fff"/>
  <circle cx="15" cy="95" r="6" fill="#fff"/>
  <circle cx="85" cy="95" r="6" fill="#fff"/>
</svg>
